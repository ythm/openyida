name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Pre-publish Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --ignore-scripts

    - name: Check JavaScript syntax
      run: |
        node --check bin/yida.js
        find lib -name "*.js" -not -path "*/node_modules/*" -not -path "*/babel-transform/*" | while read f; do node --check "$f"; done
        echo "All JS files passed syntax check"

    - name: Run tests
      run: npm test

  publish:
    name: Publish to npm & Create Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --ignore-scripts

    - name: Sync version from tag to package.json
      run: |
        TAG="${{ github.ref_name }}"
        # 去掉前缀 'v'，支持 v2026.04.01 和 2026.04.01 两种格式
        VERSION="${TAG#v}"
        echo "Tag: $TAG → Version: $VERSION"
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '$VERSION';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log('Updated package.json version to $VERSION');
        "

    - name: Sync version to SKILL.md
      run: |
        TAG="${{ github.ref_name }}"
        VERSION="${TAG#v}"
        echo "Updating SKILL.md version to $VERSION"
        node -e "
          const fs = require('fs');
          let content = fs.readFileSync('yida-skills/SKILL.md', 'utf8');
          content = content.replace(/^(\s*version:\s*)([^\n]+)/m, '\$1$VERSION');
          fs.writeFileSync('yida-skills/SKILL.md', content);
          console.log('Updated SKILL.md version to $VERSION');
        "

    - name: Determine npm tag
      id: npm-tag
      run: |
        VERSION="${{ github.ref_name }}"
        if [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-alpha"* ]] || [[ "$VERSION" == *"-rc"* ]]; then
          echo "tag=beta" >> $GITHUB_OUTPUT
        else
          echo "tag=latest" >> $GITHUB_OUTPUT
        fi

    - name: Publish to npm
      run: npm publish --access public --tag ${{ steps.npm-tag.outputs.tag }}
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Package yida-skills.zip
      run: |
        zip -r yida-skills.zip yida-skills/ -x "*.DS_Store"
        echo "Packaged yida-skills.zip ($(du -sh yida-skills.zip | cut -f1))"

    - name: Write version back to main branch
      if: ${{ !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-rc') }}
      run: |
        TAG="${{ github.ref_name }}"
        VERSION="${TAG#v}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin main
        git checkout main
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '$VERSION';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          let skill = fs.readFileSync('yida-skills/SKILL.md', 'utf8');
          skill = skill.replace(/^(metadata:\s*\n\s*version:\s*)(.+)$/m, '\$1$VERSION');
          fs.writeFileSync('yida-skills/SKILL.md', skill);
        "
        git add package.json yida-skills/SKILL.md
        git diff --cached --quiet || git commit -m "chore: bump version to $VERSION [skip ci]"
        git push origin main

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        files: yida-skills.zip
        prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
        body: |
          ## 安装 / 更新

          ```bash
          npm install -g openyida
          ```

          安装后即可在 Claude Code / OpenCode / Aone Copilot / Cursor / Qoder / 悟空 中直接使用，零配置。

          ## yida-skills 技能包

          下载 `yida-skills.zip` 可手动解压到项目目录使用，或通过以下命令自动安装：

          ```bash
          openyida copy -skills
          ```

        generate_release_notes: true
