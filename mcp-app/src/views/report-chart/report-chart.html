<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yida Report Chart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--mcp-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      background: var(--mcp-bg, #fff);
      color: var(--mcp-text, #333);
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h2 { font-size: 16px; font-weight: 600; }
    .chart-type-selector {
      display: flex;
      gap: 4px;
    }
    .chart-type-btn {
      padding: 4px 10px;
      border: 1px solid var(--mcp-border, #ddd);
      border-radius: 6px;
      background: var(--mcp-card-bg, #fff);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .chart-type-btn.active {
      background: #3870EA;
      color: #fff;
      border-color: #3870EA;
    }
    #chart-container {
      width: 100%;
      height: 360px;
      border: 1px solid var(--mcp-border, #eee);
      border-radius: 8px;
      overflow: hidden;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 360px;
      color: var(--mcp-text-secondary, #999);
    }
    .data-summary {
      margin-top: 12px;
      font-size: 12px;
      color: var(--mcp-text-secondary, #999);
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">Loading chart data...</div>
  </div>
  <script type="module" src="./mcp-app.ts"></script>
</body>
</html>
