<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yida Form Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--mcp-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      background: var(--mcp-bg, #f9f9f9);
      color: var(--mcp-text, #333);
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h2 { font-size: 16px; font-weight: 600; }
    .meta {
      font-size: 12px;
      color: var(--mcp-text-secondary, #999);
      font-family: monospace;
    }
    .field-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field-card {
      background: var(--mcp-card-bg, #fff);
      border: 1px solid var(--mcp-border, #e8e8e8);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: box-shadow 0.15s;
    }
    .field-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .field-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .field-info {
      flex: 1;
      min-width: 0;
    }
    .field-label {
      font-size: 14px;
      font-weight: 500;
    }
    .field-meta {
      font-size: 11px;
      color: var(--mcp-text-secondary, #999);
      font-family: monospace;
      margin-top: 2px;
    }
    .field-type-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #f0f0f0;
      color: #666;
      flex-shrink: 0;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--mcp-text-secondary, #999);
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">Loading form schema...</div>
  </div>
  <script type="module" src="./mcp-app.ts"></script>
</body>
</html>
